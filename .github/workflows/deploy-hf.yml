name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ananttripathiak@gmail.com"
          git config user.name "ananttripathi"
          git lfs install
          git lfs migrate import --include="*.pdf" --include-ref=refs/heads/main
          git remote add space https://ananttripathiak:${HF_TOKEN}@huggingface.co/spaces/ananttripathiak/airline-hr-policy-bot
          git push space main --force
